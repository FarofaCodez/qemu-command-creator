<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>QEMU Command Creator</title>
	<link rel="stylesheet" href="style.css">
	<link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
	<h1>QEMU Command Creator</h1>
	<p><a href="help/">Help</a> | <a href="https://github.com/FarofaCodez/qemu-command-creator">GitHub</a></p>
	<h2>Motherboard</h2>
	<label for="machine">Machine</label>
	<select name="machine" id="machine">
		<option value="q35" selected>Q35 (modern)</option>
		<option value="pc">i440FX (legacy)</option>
	</select>
	<br><br>

	<label for="ram">RAM</label>
	<input type="number" name="ram" id="ram" min="1" value="1024"><span>MB</span>
	<br><br>

	<label for="accel">Acceleration</label>
	<select name="accel" id="accel">
		<option value="kvm" selected>KVM (Hardware-based, Linux hosts only)</option>
		<option value="whpx">WHPX (Hardware-based, Windows hosts only)</option>
		<option value="hvf">HVF (Hardware-based, macOS hosts only)</option>
		<option value="tcg">TCG (Software-based, all hosts, slower)</option>
	</select>
	<br><br>

	<label for="cpu">CPU</label>
	<select name="cpu" id="cpu">
		<option value="host" selected>host: Host CPU (KVM only)</option>
		<option value="max">max: Maximum CPU features available (not recommended)</option>
		<option value="qemu64">qemu64: Fictional 64-bit CPU</option>
		<option value="qemu32">qemu32: Fictional 32-bit CPU</option>
		<option value="other" disabled>Other CPUs supported by QEMU will be added some day</option>
	</select>
	<!-- Doesn't work -->
	<!-- <span>CPU flags</span>
	<br>
	<input type="checkbox" name="hvenlight" id="hvenlight">
	<label for="hvenlight">Hyper-V Enlightments (recommended for Windows guests)</label>
	<input type="checkbox" name="popcnt" id="popcnt">
	<label for="popcnt">POPCNT</label>
	<br>
	<span>Flags that your host doesn't have will be emulated in software (slower)</span>
	<br><br> -->

	<h2>Storage</h2>
	<div id="storageDrives">
	</div>
	<br>
	<button onclick="newStorageDrive()">Add storage drive</button>

	<h2>Network</h2>
	<label for="nic">Network card model</label>
	<select name="nic" id="nic">
		<option value="virtio-net-pci" selected>virtio-net-pci: VirtIO network card connected by PCI (faster)</option>
		<option disabled>Emulated cards (slower)</option>
		<option value="e1000">e1000: Intel E1000</option>
		<option value="e1000e">e1000e: Intel E1000E</option>
		<option value="igb">igb: Intel Gigabit Ethernet</option>
	</select>

	<h2>Display</h2>
	<label for="gpu">GPU</label>
	<select name="gpu" id="gpu">
		<option value="virtio-vga-gl" selected>virtio-vga-gl: VirtIO VGA with OpenGL</option>
		<option value="virtio-vga">virtio-vga: VirtIO VGA (without OpenGL)</option>
		<option value="qxl">qxl: QXL (for non-Linux guests)</option>
		<option value="other" disabled>Other GPUs supported by QEMU may be added some day</option>
	</select>
	<br><br>

	<label for="dBackend">Display backend</label>
	<select name="dBackend" id="dBackend">
		<option value="gtk">GTK</option>
		<option value="sdl">SDL</option>
	</select>
	<br>
	<span>There is no performance difference between the GTK and SDL backends</span>
	<br><br>

	<input type="checkbox" name="gl" id="gl" checked>
	<label for="gl">OpenGL support (required for VirtIO VGA with OpenGL)</label>

	<h2>Extra devices</h2>
	<div id="extraDevices">
	</div>
	<br><button onclick="extraDevices.push(prompt('Device name'));updateExtraDevices();">Add extra device</button>
	<button onclick="['virtio-sound', 'virtio-rng', 'virtio-tablet'].forEach((value)=>{extraDevices.push(value);});updateExtraDevices();">Add useful VirtIO devices</button>
	<br><br>
	<button onclick="createCommand()">Create command</button>
	<br><br>
	<textarea name="command" id="command" rows="24" cols="80" placeholder="The created command will appear here for you to copy"></textarea>
	<script src="creator.js"></script>
</body>
</html>
